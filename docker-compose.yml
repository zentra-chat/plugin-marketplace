services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plugin_marketplace
      POSTGRES_USER: zentra
      POSTGRES_PASSWORD: zentra
    ports:
      - "5433:5432"
    volumes:
      - marketplace_data:/var/lib/postgresql/data

  marketplace:
    build: .
    environment:
      DATABASE_URL: postgres://zentra:zentra@db:5432/plugin_marketplace?sslmode=disable
      PORT: "8090"
    ports:
      - "8090:8090"
    depends_on:
      - db

volumes:
  marketplace_data:
